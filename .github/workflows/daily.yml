name: Daily Match Day

on:
  schedule:
    # 09:40 UTC, off the hour on purpose. GitHub delays scheduled runs under load,
    # worst at the top of the hour — our old '0 7' landed 3–4.5h late (10:00–11:23
    # UTC). Posting is manual, so this only sets when the post pack is READY: run
    # early + off-peak so even GitHub's worst delay finishes before the ~15:00 UTC
    # manual-post window and the ~16:00 UTC earliest US kickoffs. Post by hand at
    # your window (≈11 AM ET / 15:00 UTC).
    - cron: '40 9 * * *'
  workflow_dispatch:
    inputs:
      match_date:
        description: 'Match date YYYY-MM-DD (default: today UTC)'
        required: false
      dry_run:
        description: 'Skip tweet distribution (true/false)'
        required: false
        default: 'false'
      force_rerun:
        description: 'Re-run matches even if already completed (true/false)'
        required: false
        default: 'false'

permissions:
  contents: write

jobs:
  run-matches:
    runs-on: ubuntu-latest
    outputs:
      stage: ${{ steps.run_daily.outputs.stage }}
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run today's matches
        id: run_daily
        env:
          PYTHONUNBUFFERED: "1"
          MATCH_DATE: ${{ inputs.match_date }}
          COUNCIL_API_KEY: ${{ secrets.COUNCIL_API_KEY }}
          COUNCIL_BASE_URL: ${{ secrets.COUNCIL_BASE_URL }}
          RESEARCH_MODEL: ${{ secrets.RESEARCH_MODEL }}
          RESEARCH_MODEL_FALLBACK: ${{ secrets.RESEARCH_MODEL_FALLBACK }}
          TAVILY_API_KEY: ${{ secrets.TAVILY_API_KEY }}
        run: python daily_runner.py ${{ inputs.force_rerun == 'true' && '--force' || '' }}

      - name: Render share cards
        if: always()
        continue-on-error: true
        env:
          MATCH_DATE: ${{ inputs.match_date }}
        run: |
          playwright install chromium --with-deps
          python render_card.py --date "${MATCH_DATE:-$(date -u +%Y-%m-%d)}"

      # !cancelled(): a failed match must not discard the successful ones' artifacts,
      # but a cancelled run must not commit possibly-truncated files
      - name: Commit runs to main
        if: ${{ !cancelled() }}
        run: |
          git config user.name "ai-football-night-bot"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -f runs/
          git diff --staged --quiet || git commit -m "runs: $(date -u +%Y-%m-%d) match results"
          git push

      - name: Upload runs artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: runs-${{ github.run_id }}
          path: runs/
          if-no-files-found: warn

  update-site:
    needs: run-matches
    if: ${{ !cancelled() && needs.run-matches.outputs.stage != 'none' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download runs artifact
        uses: actions/download-artifact@v4
        with:
          name: runs-${{ github.run_id }}
          path: runs/

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Build site
        run: python generate_site.py --output-dir _site

      - name: Deploy to gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./_site
          commit_message: "site: ${{ github.run_id }}"

      - name: Upload daily thread
        uses: actions/upload-artifact@v4
        with:
          name: daily-thread-${{ github.run_id }}
          path: runs/*/THREAD.md
          if-no-files-found: warn
          retention-days: 7

